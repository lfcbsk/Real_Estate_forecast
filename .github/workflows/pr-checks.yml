name: PR Checks

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  test:
    name: Test & Quality Checks
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[dev]"
          uv pip install --system pytest-cov

      - name: Run tests with coverage
        run: |
          uv run pytest tests/ -v \
            --cov=src \
            --cov-report=term \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=50 \
            -m "not e2e"

      - name: Upload coverage to Codecov (optional)
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build Docker image (validation)
        run: |
          docker build -t realestate-api:test \
            -f docker/api.Dockerfile \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            .

      - name: Run security scan (optional)
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy image realestate-api:test || true
        continue-on-error: true

  lint:
    name: Code Linting
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linters
        run: |
          uv pip install --system flake8 black mypy isort

      - name: Run flake8
        run: |
          uv run flake8 src/ tests/ --max-line-length=120 --ignore=E501,W503

      - name: Run black (check only)
        run: |
          uv run black src/ tests/ --check --diff

      - name: Run isort (check only)
        run: |
          uv run isort src/ tests/ --check-only

      - name: Run mypy (type checking)
        run: |
          uv run mypy src/ --ignore-missing-imports || true
        continue-on-error: true

  build-validation:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: [test]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/api.Dockerfile
          push: false
          tags: realestate-api:build-check
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Streamlit image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/app.Dockerfile
          push: false
          tags: realestate-app:build-check
          cache-from: type=gha
          cache-to: type=gha,mode=max