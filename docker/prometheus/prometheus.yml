global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: realestate-api

  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          service: host

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]
        labels:
          service: containers

  # Optional: enable with `docker compose --profile gpu up`
  - job_name: dcgm-exporter
    static_configs:
      - targets: ["dcgm-exporter:9400"]
        labels:
          service: gpu
