services:
  api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    container_name: realestate-api
    ports:
      - "8000:8000"
    volumes:
      - ../data:/app/data
      - ../artifacts:/app/artifacts
      - ../mlruns:/app/mlruns
      - ../mlruns.db:/app/mlruns.db
    environment:
      - PYTHONPATH=/app
      - MLFLOW_TRACKING_URI=sqlite:///app/mlruns.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - realestate-network

  streamlit:
    build:
      context: ..
      dockerfile: docker/app.Dockerfile
    container_name: realestate-dashboard
    ports:
      - "8501:8501"
    volumes:
      - ../data:/app/data
      - ../artifacts:/app/artifacts
      - ../mlruns:/app/mlruns
    environment:
      - PYTHONPATH=/app
      - API_BASE_URL=http://api:8000/api/v1
      - MLFLOW_TRACKING_URI=sqlite:///app/mlruns.db
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - realestate-network

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: realestate-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    restart: unless-stopped
    networks:
      - realestate-network

  grafana:
    image: grafana/grafana:10.4.2
    container_name: realestate-grafana
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/mlops-overview.json
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - realestate-network

  node-exporter:
    image: prom/node-exporter:v1.8.0
    container_name: realestate-node-exporter
    ports:
      - "9100:9100"
    command:
      - --path.rootfs=/host
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    volumes:
      - /:/host:ro,rslave
    restart: unless-stopped
    networks:
      - realestate-network

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: realestate-cadvisor
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    restart: unless-stopped
    networks:
      - realestate-network

  # NVIDIA GPU metrics (Linux + NVIDIA Container Toolkit only)
  dcgm-exporter:
    profiles: ["gpu"]
    image: nvcr.io/nvidia/k8s/dcgm-exporter:3.3.5-3.4.0-ubuntu22.04
    container_name: realestate-dcgm-exporter
    ports:
      - "9400:9400"
    environment:
      - DCGM_EXPORTER_NO_HOST=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      - realestate-network

networks:
  realestate-network:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
