[project]
name = "realestate-forecast"
version = "0.1.0"
description = "Real Estate Forecast API and Dashboard"
readme = "README.md"
requires-python = ">=3.11"

dependencies = [
    "pandas>=2.0.0",
    "numpy>=1.24.0",
    "scikit-learn>=1.3.0",
    "catboost>=1.2.0",
    "onnxruntime>=1.16.0",
    "onnx>=1.15.0",

    "fastapi>=0.104.0",
    "uvicorn[standard]>=0.24.0",
    "python-multipart>=0.0.6",
    "pydantic>=2.0.0",

    "mlflow>=2.8.0",
    "optuna>=3.4.0",

    "openpyxl>=3.1.0",
    "python-dateutil>=2.8.0",

    "evidently>=0.4.0",

    "pyyaml>=6.0",

    "streamlit>=1.28.0",
    "plotly>=5.17.0",

    "gunicorn>=21.2.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4.0",
    "pytest-cov>=4.1.0",
    "httpx>=0.27.0",
]