data:
  train_dir: "../data/train/"

target:
  column: amount_new_house_transactions
  transform: log1p
cv:
  n_splits: 5

optimization:
  n_trials: 50

general:
  random_seed: 42

orchestration:
  drift:
    feature_drift_ratio_threshold: 0.2
    severity_for_retrain: ["medium", "high"]
  registry:
    min_competition_score: 0.55
    min_r2: 0.0
    max_mape: 100.0
    require_improvement_over_current: false